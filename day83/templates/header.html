<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, shrink-to-fit=no"
    />
    <meta
      name="description"
      content="Portfolio of an ML/AI developer: projects in deep learning, data science, and MLOps."
    />
    <meta name="author" content="ML/AI Developer" />
    <title>ML/AI Developer Portfolio</title>

    {% block styles %}
    <!-- Bootstrap 5 CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />

    <!-- Google fonts-->
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Fira+Code:wght@400;500&display=swap"
      rel="stylesheet"
    />

    <!-- Core theme CSS -->
    <link
      href="{{ url_for('static', filename='css/styles.css') }}"
      rel="stylesheet"
    />
    {% endblock %}
  </head>

  <body class="bg-dark text-light">
    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg navbar-dark py-3 glass-nav" id="mainNav">
      <div class="container px-4 px-lg-5">
        <a class="navbar-brand fw-bold tracking-tight" href="{{ url_for('home') }}">
          <span class="brand-bracket">&lt;</span>ML/AI Dev
          <span class="brand-bracket">/&gt;</span>
        </a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarResponsive"
          aria-controls="navbarResponsive"
          aria-expanded="false"
          aria-label="Toggle navigation"
        >
          Menu
        </button>
        <div class="collapse navbar-collapse" id="navbarResponsive">
          <ul class="navbar-nav ms-auto py-2 py-lg-0 align-items-lg-center">
            <li class="nav-item">
              <a
                class="nav-link px-lg-3 py-2 py-lg-3"
                href="{{ url_for('home') }}"
                >Home</a
              >
            </li>
            <li class="nav-item">
              <a
                class="nav-link px-lg-3 py-2 py-lg-3"
                href="{{ url_for('projects') }}"
                >Projects</a
              >
            </li>
            <li class="nav-item">
              <a
                class="nav-link px-lg-3 py-2 py-lg-3"
                href="{{ url_for('about') }}"
                >About</a
              >
            </li>
            <li class="nav-item">
              <a
                class="nav-link px-lg-3 py-2 py-lg-3"
                href="{{ url_for('contact') }}"
                >Contact</a
              >
            </li>
            <li class="nav-item d-none d-lg-block ms-2">
              <span class="badge bg-gradient-primary text-uppercase small">
                Python • Flask • ML
              </span>
            </li>
          </ul>
        </div>
      </div>
    </nav>
