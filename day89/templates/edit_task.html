{% extends "layout.html" %}

{% block title %}Edit Task{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-8 col-lg-6">
    <div class="card shadow-sm border-0">
      <div class="card-header">
        <h1 class="h5 mb-0">Edit task</h1>
      </div>
      <div class="card-body">
        <form method="post">
          <div class="mb-3">
            <label for="title" class="form-label">Title</label>
            <input
              type="text"
              id="title"
              name="title"
              value="{{ task.title }}"
              class="form-control"
              required
            >
          </div>

          <div class="mb-3">
            <label for="description" class="form-label">Description</label>
            <textarea
              id="description"
              name="description"
              rows="4"
              class="form-control"
            >{{ task.description or "" }}</textarea>
          </div>

          <div class="mb-3">
            <label for="status" class="form-label">Column</label>
            <select id="status" name="status" class="form-select">
              <option value="todo" {{ "selected" if task.status == "todo" else "" }}>To Do</option>
              <option value="in_progress" {{ "selected" if task.status == "in_progress" else "" }}>In Progress</option>
              <option value="done" {{ "selected" if task.status == "done" else "" }}>Done</option>
            </select>
          </div>

          <div class="d-flex justify-content-between align-items-center">
            <a href="{{ url_for('index') }}" class="btn btn-outline-secondary">
              Cancel
            </a>
            <button type="submit" class="btn btn-primary">
              <i class="bi bi-check2 me-1"></i>Save changes
            </button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
