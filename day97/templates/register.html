{% extends "base.html" %}
{% block title %}Rejestracja — Serpentarium{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6 col-lg-5">
    <h1 class="font-serif fw-bold text-cream h3 mb-4">Rejestracja</h1>
    <div class="auth-card rounded-4 p-4 p-md-4 border border-secondary border-opacity-25">
      <form method="post" action="{{ url_for('register') }}">
        <div class="mb-3">
          <label for="email" class="form-label text-muted-custom">E-mail</label>
          <input type="email" class="form-control form-control-lg bg-dark text-cream border-secondary" name="email" id="email" required autocomplete="username" />
        </div>
        <div class="mb-3">
          <label for="password" class="form-label text-muted-custom">Hasło (min. 6 znaków)</label>
          <input type="password" class="form-control form-control-lg bg-dark text-cream border-secondary" name="password" id="password" required autocomplete="new-password" minlength="6" />
        </div>
        <div class="mb-4">
          <label for="password_confirm" class="form-label text-muted-custom">Powtórz hasło</label>
          <input type="password" class="form-control form-control-lg bg-dark text-cream border-secondary" name="password_confirm" id="password_confirm" required autocomplete="new-password" minlength="6" />
        </div>
        <button type="submit" class="btn btn-accent btn-lg w-100">Utwórz konto</button>
      </form>
      <p class="text-center small text-muted-custom mt-3 mb-0">
        Masz już konto?
        <a href="{{ url_for('login') }}" class="link-accent">Zaloguj się</a>
      </p>
    </div>
  </div>
</div>
{% endblock %}
