{% extends "base.html" %}
{% block title %}Logowanie — Serpentarium{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6 col-lg-5">
    <h1 class="font-serif fw-bold text-cream h3 mb-4">Logowanie</h1>
    <div class="auth-card rounded-4 p-4 p-md-4 border border-secondary border-opacity-25">
      <form method="post" action="{{ url_for('login') }}">
        <input type="hidden" name="next" value="{{ next_url or '' }}" />
        <div class="mb-3">
          <label for="email" class="form-label text-muted-custom">E-mail</label>
          <input type="email" class="form-control form-control-lg bg-dark text-cream border-secondary" name="email" id="email" required autocomplete="username" />
        </div>
        <div class="mb-4">
          <label for="password" class="form-label text-muted-custom">Hasło</label>
          <input type="password" class="form-control form-control-lg bg-dark text-cream border-secondary" name="password" id="password" required autocomplete="current-password" />
        </div>
        <button type="submit" class="btn btn-accent btn-lg w-100">Zaloguj</button>
      </form>
      <p class="text-center small text-muted-custom mt-3 mb-0">
        Nie masz konta?
        <a href="{{ url_for('register') }}" class="link-accent">Zarejestruj się</a>
      </p>
    </div>
  </div>
</div>
{% endblock %}
