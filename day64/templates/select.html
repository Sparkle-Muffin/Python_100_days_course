{% extends 'base.html' %}

{% block title %}Select Movie{% endblock %}

{% block content %}
<div class="container">
    <h1 class="heading">Select Movie</h1>
    {% for movie in all_movies %}
    <form action="{{ url_for('add_to_db') }}" method="POST">
      <input type="hidden" name="movie" value='{{ movie | tojson }}'>
      <button type="submit">
          {{ movie["title"] }} - {{ movie["release_date"] }}
      </button>
    </form>
    {% endfor %}
</div>
{% endblock %}
