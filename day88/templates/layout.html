<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Cafe & Wifi{% endblock %}</title>

    <!-- Bootstrap CSS -->
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
        crossorigin="anonymous">

    <!-- Bootstrap Icons -->
    <link
        rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body class="bg-light">
<nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
    <div class="container">
        <a class="navbar-brand fw-semibold" href="{{ url_for('home') }}">
            <i class="bi bi-cup-hot me-1"></i>Cafe & Wifi
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item">
                    <a class="nav-link{% if request.endpoint == 'home' %} active{% endif %}"
                       href="{{ url_for('home') }}">Browse cafes</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link{% if request.endpoint == 'add_cafe_page' %} active{% endif %}"
                       href="{{ url_for('add_cafe_page') }}">
                        <i class="bi bi-plus-lg me-1"></i>Add cafe
                    </a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<main>
    {% block content %}{% endblock %}
</main>

<footer class="py-4 mt-5 border-top bg-white">
    <div class="container text-center small text-muted">
        <div>Cafe & Wifi API · Beautiful web UI on top of your existing endpoints.</div>
        <div class="mt-1">
            <code>/all</code>,
            <code>/random</code>,
            <code>/search</code>,
            <code>/add</code>,
            <code>/update-price/&lt;id&gt;</code>,
            <code>/report-closed/&lt;id&gt;</code>
        </div>
    </div>
</footer>

<!-- Bootstrap JS (for navbar behaviour etc.) -->
<script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
    crossorigin="anonymous"></script>
</body>
</html>
